version: "3.9"

services:
  besu-node-1:
    image: hyperledger/besu:latest
    container_name: besu-node-1
    hostname: besu-node-1
    networks:
      besu-net:
        ipv4_address: 172.25.0.2
    ports:
      - "8545:8545"
      - "30303:30303"
    volumes:
      - ./networkFiles:/networkFiles:ro
      - ./nodes/node-1/data:/data
    command: [
      "--data-path=/data",
      "--genesis-file=/networkFiles/genesis.json",
      "--node-private-key-file=/networkFiles/keys/0x040bebd4cc95915e7bcf450ff7d06817110870a9/key",
      "--rpc-http-enabled",
      "--rpc-http-host=0.0.0.0",
      "--rpc-http-port=8545",
      "--rpc-http-api=ETH,NET,IBFT,WEB3,ADMIN",
      "--p2p-host=0.0.0.0",
      "--p2p-port=30303",
      "--min-gas-price=0",
      "--profile=ENTERPRISE"
    ]
    restart: unless-stopped

  besu-node-2:
    image: hyperledger/besu:latest
    container_name: besu-node-2
    hostname: besu-node-2
    networks:
      besu-net:
        ipv4_address: 172.25.0.3
    ports:
      - "8546:8545"
      - "30304:30303"
    volumes:
      - ./networkFiles:/networkFiles:ro
      - ./nodes/node-2/data:/data
    depends_on:
      - besu-node-1
    command: [
      "--data-path=/data",
      "--genesis-file=/networkFiles/genesis.json",
      "--node-private-key-file=/networkFiles/keys/0x5703cc7ea34502131300ecc7057730f53c5507a0/key",
      "--rpc-http-enabled",
      "--rpc-http-host=0.0.0.0",
      "--rpc-http-port=8545",
      "--rpc-http-api=ETH,NET,IBFT,WEB3,ADMIN",
      "--p2p-host=0.0.0.0",
      "--p2p-port=30304",
      "--min-gas-price=0",
      "--profile=ENTERPRISE"
    ]

  besu-node-3:
    image: hyperledger/besu:latest
    container_name: besu-node-3
    hostname: besu-node-3
    networks:
      besu-net:
        ipv4_address: 172.25.0.4
    ports:
      - "8547:8545"
      - "30305:30303"
    volumes:
      - ./networkFiles:/networkFiles:ro
      - ./nodes/node-3/data:/data
    depends_on:
      - besu-node-1
    command: [
      "--data-path=/data",
      "--genesis-file=/networkFiles/genesis.json",
      "--node-private-key-file=/networkFiles/keys/0x5f2d8173652e4ae310f4876dd104cb02e76eadba/key",
      "--rpc-http-enabled",
      "--rpc-http-host=0.0.0.0",
      "--rpc-http-port=8545",
      "--rpc-http-api=ETH,NET,IBFT,WEB3,ADMIN",
      "--p2p-host=0.0.0.0",
      "--p2p-port=30305",
      "--min-gas-price=0",
      "--profile=ENTERPRISE"
    ]

  besu-node-4:
    image: hyperledger/besu:latest
    container_name: besu-node-4
    hostname: besu-node-4
    networks:
      besu-net:
        ipv4_address: 172.25.0.5
    ports:
      - "8548:8545"
      - "30306:30303"
    volumes:
      - ./networkFiles:/networkFiles:ro
      - ./nodes/node-4/data:/data
    depends_on:
      - besu-node-1
    command: [
      "--data-path=/data",
      "--genesis-file=/networkFiles/genesis.json",
      "--node-private-key-file=/networkFiles/keys/0xad86d94038a43696c2c053b54dd198893b829101/key",
      "--rpc-http-enabled",
      "--rpc-http-host=0.0.0.0",
      "--rpc-http-port=8545",
      "--rpc-http-api=ETH,NET,IBFT,WEB3,ADMIN",
      "--p2p-host=0.0.0.0",
      "--p2p-port=30306",
      "--min-gas-price=0",
      "--profile=ENTERPRISE"
    ]

networks:
  besu-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.25.0.0/16
