version: "3.9"

services:
  backend:
    build: ./backend
    container_name: hafez-backend
    ports:
      - "4000:4000"
    environment:
      - PORT=4000
      - RPC_URL=http://host.docker.internal:8545
      - TOKEN_CONTRACT_ADDRESS=YOUR_HAFEZ_TOKEN_ADDRESS
      - ADMIN_PRIVATE_KEY=YOUR_ADMIN_PRIVATE_KEY
    volumes:
      - ./backend:/app
    depends_on: []

  frontend:
    build: ./frontend
    container_name: hafez-frontend
    ports:
      - "3000:4173"
    environment:
      - VITE_API_URL=http://localhost:4000/api
    volumes:
      - ./frontend:/app
    depends_on:
      - backend

# If your Besu node is available on the host machine, use host.docker.internal or the host's private IP from within Docker.
